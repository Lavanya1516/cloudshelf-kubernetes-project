apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: cloudshelf-hpa
  namespace: cloudshelf-namespace

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudshelf-web

  minReplicas: 2
  maxReplicas: 5

  metrics:
  - type: Resource

    resource:
      name: cpu

      target:
        type: Utilization
        averageUtilization: 50
