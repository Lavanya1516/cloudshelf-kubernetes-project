apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudshelf-web
  namespace: cloudshelf-namespace

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudshelf-web

  template:
    metadata:
      labels:
        app: cloudshelf-web

    spec:
      containers:
      - name: nginx

        image: nginx:1.27

        ports:
        - containerPort: 80

        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
          readOnly: true

      volumes:
      - name: website-content
        configMap:
          name: website-config
